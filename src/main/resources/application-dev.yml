spring:
    datasource:
        url: jdbc:mysql://localhost:3306/commercex
        username: root
        password: 1234
        driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
        open-in-view: false
        show-sql: true
        properties:
            hibernate:
                format_sql: true

    flyway:
        enabled: true
        locations: classpath:db/migration
